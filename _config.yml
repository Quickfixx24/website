title: "QuickFixx24"
description: "Staff Verification Portal — QuickFixx24, Chittagong"
baseurl: ""                      # ← EMPTY – no subdirectory, uses root domain
url: "https://www.quickfixx24.com"   # Your custom domain

# ── Collections ──────────────────────────────────────────────────
collections:
  staff_members:
    output: true
    permalink: /verify/:basename/

# ── Defaults ─────────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: "staff_members"
    values:
      layout: "verification"

# ── Build ─────────────────────────────────────────────────────────
markdown: kramdown
theme: ~
plugins:
  - jekyll-feed

# ── Exclude from processing ───────────────────────────────────────
exclude:
  - "*.css"
  - "Gemfile"
  - "Gemfile.lock"
  - node_modules
  - tools/
  - "README.md"
  - "*.py"
